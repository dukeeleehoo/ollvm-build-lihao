name: Build Polaris Obfuscator (Fix LLVM 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install Dependencies (LLVM 16)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git software-properties-common
          # 添加 LLVM 16 官方仓库
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main"
          sudo apt-get update
          sudo apt-get install -y lld-16 clang-16

      - name: Checkout Polaris
        uses: actions/checkout@v4
        with:
          repository: za233/Polaris-Obfuscator
          ref: main
          path: Polaris-Obfuscator

      - name: Build Polaris
        run: |
          cd Polaris-Obfuscator/src
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=Off \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_USE_LINKER=lld \
            -DCMAKE_C_COMPILER=clang-16 \
            -DCMAKE_CXX_COMPILER=clang++-16 \
            ../llvm
          ninja clang lld

      - name: Package Artifact
        run: |
          mkdir -p polaris-toolchain/bin
          cp Polaris-Obfuscator/src/build/bin/clang      polaris-toolchain/bin/
          cp Polaris-Obfuscator/src/build/bin/clang++    polaris-toolchain/bin/
          cp Polaris-Obfuscator/src/build/bin/clang-cl   polaris-toolchain/bin/
          cp Polaris-Obfuscator/src/build/bin/lld        polaris-toolchain/bin/
          tar -czf polaris-toolchain.tar.gz polaris-toolchain

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-toolchain
          path: polaris-toolchain.tar.gz
          if-no-files-found: error
