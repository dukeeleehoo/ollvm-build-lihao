name: Build OLLVM-21 Toolchain

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake git lld clang

    - name: Clone OLLVM-21 Source
      run: |
        git clone https://github.com/lux-QAQ/ollvm-clang21.0
        cd ollvm-clang21.0

    - name: Configure CMake (Minimal Mode)
      run: |
        cd ollvm-clang21.0
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang" \
          -DLLVM_TARGETS_TO_BUILD="X86" \
          -DLLVM_USE_LINKER=lld \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          ../llvm

    - name: Build Clang (Single Thread)
      run: |
        cd ollvm-clang21.0/build
        ninja -j 1 clang

    - name: Package for Windows
      run: |
        cd ollvm-clang21.0/build
        mkdir -p ollvm-toolchain/bin
        cp bin/clang ollvm-toolchain/bin/
        cp bin/clang++ ollvm-toolchain/bin/
        cp bin/clang-cl ollvm-toolchain/bin/
        tar -czf ../ollvm21-toolchain.tar.gz ollvm-toolchain

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ollvm21-toolchain
        path: ollvm-clang21.0/build/ollvm21-toolchain.tar.gz
